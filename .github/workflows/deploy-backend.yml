name: Deploy Backend to Hetzner (Docker)

on:
    push:
        branches: [main, develop]
        paths:
            - "agent/**"
            - "packages/**"
            - "package.json"
            - "pnpm-lock.yaml"
            - "Dockerfile"
            - "docker-compose.yml"
    workflow_dispatch:

env:
    IMAGE_NAME: familexyz/agent
    CONTAINER_NAME: familexyz-backend

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build Docker image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  file: ./Dockerfile
                  tags: ${{ env.IMAGE_NAME }}:latest,${{ env.IMAGE_NAME }}:${{ github.sha }}
                  outputs: type=docker,dest=/tmp/familexyz-image.tar
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Upload image to server
              uses: appleboy/scp-action@v0.1.7
              with:
                  host: ${{ secrets.HETZNER_HOST }}
                  username: ${{ secrets.HETZNER_USERNAME }}
                  key: ${{ secrets.HETZNER_SSH_KEY }}
                  port: ${{ secrets.HETZNER_PORT || 22 }}
                  source: "/tmp/familexyz-image.tar"
                  target: "/tmp/"

            - name: Deploy to Hetzner Server
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.HETZNER_HOST }}
                  username: ${{ secrets.HETZNER_USERNAME }}
                  key: ${{ secrets.HETZNER_SSH_KEY }}
                  port: ${{ secrets.HETZNER_PORT || 22 }}
                  script: |
                      set -e

                      # Load the new Docker image
                      docker load -i /tmp/familexyz-image.tar

                      # Create deployment directory if it doesn't exist
                      mkdir -p /opt/familexyz
                      cd /opt/familexyz

                      # Download docker-compose.yml if it doesn't exist
                      if [ ! -f docker-compose.yml ]; then
                          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/docker-compose.yml -o docker-compose.yml
                      fi

                      # Stop existing container gracefully
                      docker compose down --timeout 30 || true

                      # Remove old images (keep last 2 versions)
                      docker images ${{ env.IMAGE_NAME }} --format "table {{.Repository}}:{{.Tag}}\t{{.ID}}" | tail -n +2 | head -n -2 | awk '{print $2}' | xargs -r docker rmi || true

                      # Start the new container
                      docker compose up -d

                      # Clean up the uploaded tar file
                      rm -f /tmp/familexyz-image.tar

                      echo "✅ Deployment completed successfully"

            - name: Health Check
              run: |
                  echo "⏳ Waiting for service to start..."
                  sleep 45

                  echo "🏥 Performing health check..."
                  for i in {1..5}; do
                      if curl -f http://${{ secrets.HETZNER_HOST }}:3000/health; then
                          echo "✅ Health check passed!"
                          exit 0
                      fi
                      echo "⏳ Attempt $i failed, retrying in 10 seconds..."
                      sleep 10
                  done

                  echo "❌ Health check failed after 5 attempts"
                  exit 1

            - name: Cleanup on failure
              if: failure()
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.HETZNER_HOST }}
                  username: ${{ secrets.HETZNER_USERNAME }}
                  key: ${{ secrets.HETZNER_SSH_KEY }}
                  port: ${{ secrets.HETZNER_PORT || 22 }}
                  script: |
                      echo "🔄 Deployment failed, attempting rollback..."
                      cd /opt/familexyz

                      # Try to restart with the previous image
                      docker compose down || true
                      docker compose up -d || true

                      # Clean up failed deployment artifacts
                      rm -f /tmp/familexyz-image.tar
