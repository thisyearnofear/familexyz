name: Deploy Backend to Hetzner (Docker)

on:
    push:
        branches: [main, develop]
        paths:
            - "agent/**"
            - "packages/**"
            - "package.json"
            - "pnpm-lock.yaml"
            - "Dockerfile"
            - "docker-compose.yml"
            - ".github/workflows/deploy-backend.yml"
    workflow_dispatch:

env:
    IMAGE_NAME: familexyz/agent
    CONTAINER_NAME: familexyz-backend

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Build Docker image
              run: |
                  echo "🐳 Building Docker image..."
                  docker build -t ${{ env.IMAGE_NAME }}:latest -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

                  echo "📦 Pushing Docker image to GitHub Container Registry..."
                  echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

                  # Tag for GitHub Container Registry
                  docker tag ${{ env.IMAGE_NAME }}:latest ghcr.io/${{ github.repository_owner }}/familexyz:latest
                  docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/familexyz:${{ github.sha }}

                  # Push to registry
                  docker push ghcr.io/${{ github.repository_owner }}/familexyz:latest
                  docker push ghcr.io/${{ github.repository_owner }}/familexyz:${{ github.sha }}

                  echo "✅ Image pushed to registry successfully"

            # No need to upload tar file - we'll pull from registry

            - name: Deploy to Hetzner Server
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.HETZNER_HOST }}
                  username: ${{ secrets.HETZNER_USERNAME }}
                  key: ${{ secrets.HETZNER_SSH_KEY }}
                  port: ${{ secrets.HETZNER_PORT }}
                  script: |
                      set -e

                      echo "🚀 Starting deployment process..."

                      # Pull the new Docker image from registry
                      echo "📦 Pulling Docker image from registry..."
                      docker pull ghcr.io/${{ github.repository_owner }}/familexyz:latest

                      # Tag the image with local name for docker-compose
                      docker tag ghcr.io/${{ github.repository_owner }}/familexyz:latest familexyz/agent:latest

                      echo "✅ Docker image pulled and tagged successfully"

                      # Create deployment directory if it doesn't exist
                      mkdir -p /opt/familexyz
                      cd /opt/familexyz

                      # Download docker-compose.yml if it doesn't exist
                      if [ ! -f docker-compose.yml ]; then
                          echo "📋 Downloading docker-compose.yml..."
                          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/docker-compose.yml -o docker-compose.yml
                      fi

                      # Stop existing container gracefully
                      echo "⏹️  Stopping existing containers..."
                      docker compose down --timeout 30 || true

                      # Remove old images (keep last 2 versions)
                      echo "🧹 Cleaning up old images..."
                      docker images ${{ env.IMAGE_NAME }} --format "table {{.Repository}}:{{.Tag}}\t{{.ID}}" | tail -n +2 | head -n -2 | awk '{print $2}' | xargs -r docker rmi || true

                      # Start the new container
                      echo "▶️  Starting new containers..."
                      docker compose up -d

                      # Wait a moment for containers to start
                      sleep 10

                      # Check container status
                      echo "📊 Container status:"
                      docker compose ps

                      # Check container logs for any startup issues
                      echo "📋 Container logs (last 20 lines):"
                      docker compose logs --tail=20 familexyz-backend || true

                      # Check if the health endpoint is responding internally
                      echo "🔍 Testing health endpoint internally..."
                      docker compose exec -T familexyz-backend curl -f http://localhost:3001/ || echo "Internal health check failed"

                      # Clean up the uploaded tar file
                      rm -f /tmp/familexyz-image.tar

                      echo "✅ Deployment completed successfully"

            - name: Health Check
              run: |
                  echo "⏳ Waiting for service to start..."
                  sleep 45

                  echo "🏥 Performing health check..."
                  for i in {1..5}; do
                      if curl -f http://${{ secrets.HETZNER_HOST }}:3001/; then
                          echo "✅ Health check passed!"
                          exit 0
                      fi
                      echo "⏳ Attempt $i failed, retrying in 10 seconds..."
                      sleep 10
                  done

                  echo "❌ Health check failed after 5 attempts"
                  exit 1

            - name: Cleanup on failure
              if: failure()
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.HETZNER_HOST }}
                  username: ${{ secrets.HETZNER_USERNAME }}
                  key: ${{ secrets.HETZNER_SSH_KEY }}
                  port: ${{ secrets.HETZNER_PORT }}
                  script: |
                      echo "🔄 Deployment failed, attempting rollback..."
                      cd /opt/familexyz

                      # Try to restart with the previous image
                      docker compose down || true
                      docker compose up -d || true

                      # Clean up failed deployment artifacts
                      rm -f /tmp/familexyz-image.tar
