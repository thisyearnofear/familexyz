name: Deploy Backend to Hetzner (Docker)

on:
    push:
        branches: [main, develop]
        paths:
            - "agent/**"
            - "packages/**"
            - "package.json"
            - "pnpm-lock.yaml"
            - "Dockerfile"
            - "docker-compose.yml"
            - ".github/workflows/deploy-backend.yml"
    workflow_dispatch:

env:
    IMAGE_NAME: familexyz/agent
    CONTAINER_NAME: familexyz-backend

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Build Docker image
              run: |
                  echo "🐳 Building Docker image..."
                  docker build -t ${{ env.IMAGE_NAME }}:latest -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

                  echo "📦 Saving Docker image to tar file..."
                  docker save ${{ env.IMAGE_NAME }}:latest -o familexyz-image.tar

                  echo "✅ Image saved. File size:"
                  ls -lh familexyz-image.tar

            - name: Upload image to server
              uses: appleboy/scp-action@v0.1.7
              with:
                  host: ${{ secrets.HETZNER_HOST }}
                  username: ${{ secrets.HETZNER_USERNAME }}
                  key: ${{ secrets.HETZNER_SSH_KEY }}
                  port: ${{ secrets.HETZNER_PORT }}
                  source: "familexyz-image.tar"
                  target: "/tmp/"

            - name: Deploy to Hetzner Server
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.HETZNER_HOST }}
                  username: ${{ secrets.HETZNER_USERNAME }}
                  key: ${{ secrets.HETZNER_SSH_KEY }}
                  port: ${{ secrets.HETZNER_PORT }}
                  script: |
                      set -e

                      echo "🚀 Starting deployment process..."

                      # Load the new Docker image
                      echo "📦 Loading Docker image..."
                      if [ -f /tmp/familexyz-image.tar ]; then
                          docker load -i /tmp/familexyz-image.tar
                          echo "✅ Docker image loaded successfully"
                      else
                          echo "❌ Docker image tar file not found at /tmp/familexyz-image.tar!"
                          echo "Available files in /tmp:"
                          ls -la /tmp/
                          exit 1
                      fi

                      # Create deployment directory if it doesn't exist
                      mkdir -p /opt/familexyz
                      cd /opt/familexyz

                      # Download docker-compose.yml if it doesn't exist
                      if [ ! -f docker-compose.yml ]; then
                          echo "📋 Downloading docker-compose.yml..."
                          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/docker-compose.yml -o docker-compose.yml
                      fi

                      # Stop existing container gracefully
                      echo "⏹️  Stopping existing containers..."
                      docker compose down --timeout 30 || true

                      # Remove old images (keep last 2 versions)
                      echo "🧹 Cleaning up old images..."
                      docker images ${{ env.IMAGE_NAME }} --format "table {{.Repository}}:{{.Tag}}\t{{.ID}}" | tail -n +2 | head -n -2 | awk '{print $2}' | xargs -r docker rmi || true

                      # Start the new container
                      echo "▶️  Starting new containers..."
                      docker compose up -d

                      # Wait a moment for containers to start
                      sleep 10

                      # Check container status
                      echo "📊 Container status:"
                      docker compose ps

                      # Clean up the uploaded tar file
                      rm -f /tmp/familexyz-image.tar

                      echo "✅ Deployment completed successfully"

            - name: Health Check
              run: |
                  echo "⏳ Waiting for service to start..."
                  sleep 45

                  echo "🏥 Performing health check..."
                  for i in {1..5}; do
                      if curl -f http://${{ secrets.HETZNER_HOST }}:3000/health; then
                          echo "✅ Health check passed!"
                          exit 0
                      fi
                      echo "⏳ Attempt $i failed, retrying in 10 seconds..."
                      sleep 10
                  done

                  echo "❌ Health check failed after 5 attempts"
                  exit 1

            - name: Cleanup on failure
              if: failure()
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.HETZNER_HOST }}
                  username: ${{ secrets.HETZNER_USERNAME }}
                  key: ${{ secrets.HETZNER_SSH_KEY }}
                  port: ${{ secrets.HETZNER_PORT }}
                  script: |
                      echo "🔄 Deployment failed, attempting rollback..."
                      cd /opt/familexyz

                      # Try to restart with the previous image
                      docker compose down || true
                      docker compose up -d || true

                      # Clean up failed deployment artifacts
                      rm -f /tmp/familexyz-image.tar
