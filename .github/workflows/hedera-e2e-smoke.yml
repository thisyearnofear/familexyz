name: Hedera E2E Smoke

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Security audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Build hedera-core
        run: pnpm --filter @elizaos/hedera-core build

      - name: Run Hedera E2E Smoke
        env:
          HEDERA_NETWORK: testnet
          HEDERA_ACCOUNT_ID: ${{ secrets.HEDERA_ACCOUNT_ID }}
          HEDERA_PRIVATE_KEY: ${{ secrets.HEDERA_PRIVATE_KEY }}
        run: pnpm --filter @elizaos/hedera-core smoke:e2e