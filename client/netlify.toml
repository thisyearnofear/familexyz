[build]
  # Build command - build workspace dependencies first, then client
  command = "pnpm install --no-frozen-lockfile && pnpm run build --filter=@elizaos/hedera-wallet... && pnpm run build --filter=."

  # Directory to publish (Vite default output)
  publish = "dist"

  # Environment variables for build
  [build.environment]
    NODE_VERSION = "22"
    PNPM_VERSION = "9"
    PNPM_FLAGS = "--filter ."

# Redirect rules for SPA (Single Page Application)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://famile.xyz https://api.famile.xyz wss://famile.xyz;"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache fonts
[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# NOTE: API calls use VITE_API_BASE_URL = "https://api.famile.xyz"
# No proxy redirects needed - direct HTTPS to backend