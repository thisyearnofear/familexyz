[build]
  # Build command
  command = "pnpm install --filter . --no-frozen-lockfile && pnpm run build"

  # Directory to publish (Vite default output)
  publish = "dist"

  # Environment variables for build
  [build.environment]
    NODE_VERSION = "22"
    PNPM_VERSION = "9"
    PNPM_FLAGS = "--filter ."

# Redirect rules for SPA (Single Page Application)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://famile.xyz wss://famile.xyz;"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache fonts
[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# API proxy to backend (optional - for development)
[[redirects]]
  from = "/api/*"
  to = "https://famile.xyz/api/:splat"
  status = 200
  force = false

# Health check endpoint
[[redirects]]
  from = "/health"
  to = "https://famile.xyz/health"
  status = 200
  force = false