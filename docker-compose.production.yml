# FamilyXYZ - Production Deployment with Nginx Reverse Proxy
# Use this compose file for production deployment on Hetzner VPS

version: '3.8'

services:
    # Backend API (internal network only)
    familexyz-backend:
        image: familexyz/agent:latest
        container_name: familexyz-backend
        restart: unless-stopped
        env_file:
            - .env
        environment:
            - NODE_ENV=production
            - HEALTH_PORT=3001
            - CHARACTER_PATHS=/app/characters/wisdom.character.json,/app/characters/intimacy.character.json,/app/characters/generationalBridge.character.json,/app/characters/presence.character.json,/app/characters/growth.character.json
            - MODEL_PROVIDER=venice
        # Expose only to internal network (not to host)
        expose:
            - "3000"
            - "3001"
        volumes:
            - familexyz-data:/app/data
            - familexyz-logs:/app/logs
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 60s
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"
        deploy:
            resources:
                limits:
                    memory: 1G
                    cpus: "1.0"
                reservations:
                    memory: 512M
                    cpus: "0.5"
        networks:
            - familexyz-internal

    # Nginx reverse proxy with TLS
    nginx-proxy:
        image: nginx:alpine
        container_name: familexyz-nginx
        restart: unless-stopped
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
            - ./docker/nginx/certbot/www:/var/www/certbot:ro
            - ./docker/nginx/certbot/conf:/etc/letsencrypt:ro
        depends_on:
            - familexyz-backend
        networks:
            - familexyz-internal
        command: "/bin/sh -c 'nginx -g \"daemon off;\"'"

    # Certbot for Let's Encrypt SSL certificates
    certbot:
        image: certbot/certbot
        container_name: familexyz-certbot
        volumes:
            - ./docker/nginx/certbot/www:/var/www/certbot:rw
            - ./docker/nginx/certbot/conf:/etc/letsencrypt:rw
        entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
    familexyz-data:
        driver: local
    familexyz-logs:
        driver: local

networks:
    familexyz-internal:
        driver: bridge
