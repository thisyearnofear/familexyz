name: familexyz

services:
    familexyz-backend:
        image: familexyz/agent:latest
        container_name: familexyz-backend
        restart: unless-stopped
        env_file:
            - .env
        environment:
            - NODE_ENV=production
            - HEALTH_PORT=3001
            - CHARACTER_PATHS=/app/characters/wisdom.character.json,/app/characters/intimacy.character.json,/app/characters/generationalBridge.character.json,/app/characters/presence.character.json,/app/characters/growth.character.json
        ports:
            - "3004:3000"
            - "3005:3001" # Health check port
        volumes:
            - familexyz-data:/app/data
            - familexyz-logs:/app/logs
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 60s
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"
        deploy:
            resources:
                limits:
                    memory: 1G
                    cpus: "1.0"
                reservations:
                    memory: 512M
                    cpus: "0.5"
        networks:
            - familexyz-network

    # Optional: Redis for caching (uncomment if needed)
    # redis:
    #     image: redis:7-alpine
    #     container_name: familexyz-redis
    #     restart: unless-stopped
    #     ports:
    #         - "6379:6379"
    #     volumes:
    #         - familexyz-redis-data:/data
    #     command: redis-server --appendonly yes
    #     networks:
    #         - familexyz-network

volumes:
    familexyz-data:
        driver: local
    familexyz-logs:
        driver: local
    # familexyz-redis-data:
    #     driver: local

networks:
    familexyz-network:
        driver: bridge
