# FamilyXYZ Backend - Nginx Config for api.famile.xyz
# ENHANCEMENT: Add this to existing api.famile.xyz nginx config
# Routes /api/* and /health to FamilyXYZ backend (localhost:3004/3005)
# Does NOT disrupt existing apps on port 4000

upstream familyxyz_backend {
    server 127.0.0.1:3004;
    keepalive 16;
}

upstream familyxyz_health {
    server 127.0.0.1:3005;
    keepalive 4;
}

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=familyxyz_api:10m rate=10r/s;

server {
    server_name api.famile.xyz;
    
    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # FamilyXYZ API routes (NEW - enhanced)
    location = /health {
        limit_req zone=familyxyz_api burst=20 nodelay;
        proxy_pass http://familyxyz_health/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }
    
    location = /ready {
        limit_req zone=familyxyz_api burst=20 nodelay;
        proxy_pass http://familyxyz_health/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }
    
    location /api/ {
        limit_req zone=familyxyz_api burst=20 nodelay;
        limit_req_status 429;
        
        proxy_pass http://familyxyz_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }
    
    # Existing app (port 4000) - KEEP as fallback
    location / {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        
        proxy_pass_header Access-Control-Allow-Origin;
        proxy_pass_header Access-Control-Allow-Credentials;
        proxy_pass_header Access-Control-Allow-Methods;
        proxy_pass_header Access-Control-Allow-Headers;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/api.famile.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.famile.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = api.famile.xyz) {
        return 301 https://$host$request_uri;
    }

    server_name api.famile.xyz;
    listen 80;
    return 404;
}
