# =================================
# FamilyXYZ Production Docker Compose
# Clean separation of frontend and backend
# =================================

services:
  # Backend API service
  familexyz-backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: familexyz-backend
    restart: unless-stopped
    environment:
      # Core Configuration
      - NODE_ENV=production
      - PORT=3000
      - PREVENT_UNHANDLED_EXIT=true
      - LOG_LEVEL=info
      
      # Database
      - DATABASE_URL=sqlite:///app/data/familexyz.db
      - REDIS_URL=redis://redis:6379
      
      # AI Model APIs
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_GENERATIVE_AI_API_KEY=${GOOGLE_GENERATIVE_AI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY:-}
      
      # Social Media Integration
      - TWITTER_USERNAME=${TWITTER_USERNAME:-}
      - TWITTER_PASSWORD=${TWITTER_PASSWORD:-}
      - TWITTER_EMAIL=${TWITTER_EMAIL:-}
      - TWITTER_2FA_SECRET=${TWITTER_2FA_SECRET:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - DISCORD_APPLICATION_ID=${DISCORD_APPLICATION_ID:-}
      - DISCORD_API_TOKEN=${DISCORD_API_TOKEN:-}
      
      # Blockchain Configuration
      - EVM_PRIVATE_KEY=${EVM_PRIVATE_KEY:-}
      - SOLANA_PRIVATE_KEY=${SOLANA_PRIVATE_KEY:-}
      - SOLANA_PUBLIC_KEY=${SOLANA_PUBLIC_KEY:-}
      - SOLANA_RPC_URL=${SOLANA_RPC_URL:-https://api.mainnet-beta.solana.com}
      
      # GoodDollar Integration
      - GOODDOLLAR_PRIVATE_KEY=${GOODDOLLAR_PRIVATE_KEY:-}
      - GOODDOLLAR_RPC_URL=${GOODDOLLAR_RPC_URL:-https://rpc.fuse.io}
      - GOODDOLLAR_ENABLE_STREAMING=${GOODDOLLAR_ENABLE_STREAMING:-false}
      
      # Security
      - CORS_ORIGINS=http://localhost,https://*.familexyz.com
      - TRUST_PROXY=true
      - WALLET_SECRET_SALT=${WALLET_SECRET_SALT:-default_salt_change_in_production}
      
      # Performance
      - MAX_MEMORY_USAGE=1024
      - EXPRESS_MAX_PAYLOAD=10mb
    volumes:
      - backend_data:/app/data
      - backend_logs:/app/logs
      - backend_uploads:/app/data/uploads
    ports:
      - "3000:3000"
    depends_on:
      - redis
    networks:
      - familexyz-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Frontend web application
  familexyz-frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: familexyz-frontend
    restart: unless-stopped
    environment:
      - BACKEND_URL=http://familexyz-backend:3000
      - NODE_ENV=production
      - APP_VERSION=1.0.0
      - API_TIMEOUT=30000
      - ENABLE_ANALYTICS=false
    ports:
      - "80:80"
    depends_on:
      - familexyz-backend
    networks:
      - familexyz-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: familexyz-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-familexyz_redis_2024}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - familexyz-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

# Named volumes for data persistence
volumes:
  backend_data:
    driver: local
  backend_logs:
    driver: local
  backend_uploads:
    driver: local
  redis_data:
    driver: local

# Network for inter-service communication
networks:
  familexyz-network:
    driver: bridge
