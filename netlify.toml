[build]
  base = "."
  publish = "client/dist"
  command = "echo 'Node version:' $(node --version) && echo 'NPM version:' $(npm --version) && chmod +x client/netlify-build.sh && bash client/netlify-build.sh"
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF client/"

[build.environment]
  NODE_VERSION = "22"
  NPM_CONFIG_FUND = "false"
  NPM_CONFIG_AUDIT = "false"
  NPM_CONFIG_UPDATE_NOTIFIER = "false"
  NPM_CONFIG_OPTIONAL = "false"
  SKIP_OPTIONAL_DEPS = "true"
  PNPM_CONFIG_OPTIONAL = "false"
  PNPM_CONFIG_AUTO_INSTALL_PEERS = "false"
  PNPM_CONFIG_STRICT_PEER_DEPENDENCIES = "false"
  CI = "true"
  # Production environment variables
  VITE_API_BASE_URL = "https://famile.xyz/api"
  VITE_APP_VERSION = "1.0.0-beta"
  VITE_APP_NAME = "FamilyXYZ"
  VITE_API_TIMEOUT = "30000"
  VITE_API_RETRY_ATTEMPTS = "3"
  VITE_DEBUG = "false"
  VITE_LOG_LEVEL = "warn"
  VITE_ENABLE_ANALYTICS = "true"
  VITE_ENABLE_ERROR_REPORTING = "true"
  VITE_CACHE_TIME = "300000"
  VITE_STALE_TIME = "60000"
  VITE_TRUST_PROXY = "true"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  environment = { VITE_SERVER_PORT = "3000" }

[context.deploy-preview]
  environment = { VITE_SERVER_PORT = "3000" }

[context.branch-deploy]
  environment = { VITE_SERVER_PORT = "3000" }

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:;"