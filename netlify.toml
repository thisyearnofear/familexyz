[build]
  base = "client"
  publish = "dist"
  command = "pnpm install --filter . --no-frozen-lockfile && pnpm run build"

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "9"
  PNPM_FLAGS = "--filter ."
  CI = "true"
  # Production environment variables
  VITE_API_BASE_URL = "https://api.famile.xyz"
  VITE_APP_VERSION = "1.0.0-beta"
  VITE_APP_NAME = "FamilyXYZ"
  VITE_API_TIMEOUT = "30000"
  VITE_API_RETRY_ATTEMPTS = "3"
  VITE_DEBUG = "false"
  VITE_LOG_LEVEL = "warn"
  VITE_ENABLE_ANALYTICS = "true"
  VITE_ENABLE_ERROR_REPORTING = "true"
  VITE_CACHE_TIME = "300000"
  VITE_STALE_TIME = "60000"
  VITE_TRUST_PROXY = "true"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  environment = { VITE_SERVER_PORT = "3000" }

[context.deploy-preview]
  environment = { VITE_SERVER_PORT = "3000" }

[context.branch-deploy]
  environment = { VITE_SERVER_PORT = "3000" }

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.famile.xyz https:;"